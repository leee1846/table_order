<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자료실</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        text-align: center;
      }

      .logo {
        margin-bottom: 40px;
      }

      .logo img {
        max-width: 200px;
        height: auto;
      }

      .download-section {
        margin-bottom: 30px;
      }

      .download-section:last-child {
        margin-bottom: 0;
      }

      .app-label {
        color: #333;
        font-size: 16px;
        margin-bottom: 12px;
      }

      .download-button {
        display: inline-block;
        width: 100%;
        padding: 12px 24px;
        background: #333;
        color: white;
        text-decoration: none;
        font-size: 16px;
        border: 1px solid #333;
      }

      .download-button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="/logo.png" alt="캡스 스마트오더" />
      </div>

      <div class="download-section">
        <div class="app-label">메뉴판앱</div>
        <a href="#" class="download-button" id="menuAppLink" download
          >다운로드</a
        >
      </div>

      <div class="download-section">
        <div class="app-label">관리자앱</div>
        <a href="#" class="download-button" id="adminAppLink" download
          >다운로드</a
        >
      </div>
    </div>

    <script>
      // 앱 다운로드 링크 설정
      const URLS = {
        MENU_APP_DOWNLOAD:
          'https://nexa-test.handorder.co.kr/apk/MENU/nexa-menu-debug.apk',
        ADMIN_APP_DOWNLOAD:
          'https://nexa-test.handorder.co.kr/apk/POS_APP/nexa-admin-debug.apk',
      };

      const menuAppLink = document.getElementById('menuAppLink');
      const adminAppLink = document.getElementById('adminAppLink');

      // 메뉴판 앱 다운로드 설정
      menuAppLink.href = URLS.MENU_APP_DOWNLOAD;
      menuAppLink.download = 'nexa-menu-debug.apk';

      // 관리자 앱 다운로드 설정
      adminAppLink.href = URLS.ADMIN_APP_DOWNLOAD;
      adminAppLink.download = 'nexa-admin-debug.apk';
    </script>
  </body>
</html>
